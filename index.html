<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Teduh - Landing Page</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/tooplate-infinite-loop.css" />
</head>
<body>
    <section id="infinite" class="text-white tm-font-big tm-parallax">
        <nav class="navbar navbar-expand-md tm-navbar" id="tmNav">
            <div class="container">
                <div class="tm-next">
                    <a href="#infinite" class="navbar-brand">Ruang Teduh</a>
                    
                    <div id="greetingArea" style="margin-top: 5px;">
                        <span id="userInfo" style="color: #f97316; font-weight: bold; font-size: 1.1rem;">
                            Memuat...
                        </span>
                    </div>

                    <div id="authArea">
                        <button onclick="goLogin()" class="nav-cta" id="loginButton">Login</button>
                    </div>
                </div>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item"><a class="nav-link tm-nav-link" href="#infinite">Beranda</a></li>
                        <li class="nav-item"><a class="nav-link tm-nav-link" href="#contact">Kontak</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="text-center tm-hero-text-container">
            <div class="tm-hero-text-container-inner">
                <h2 class="tm-hero-title">Ruang Teduh</h2>
                <p class="tm-hero-subtitle">Hijau yang menenangkan <br> langit yang menemani</p>
            </div>
        </div>
    </section>

    <script src="js/jquery-1.9.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script>
        // 1. Fungsi Pindah ke Login
        function goLogin() {
            window.location.href = "login/index.html";
        }

        // 2. LOGIKA MENAMPILKAN NAMA (REVISI UTAMA)
        window.onload = function() {
            const namaSimpanan = localStorage.getItem("namaPengguna");
            const textUserInfo = document.getElementById("userInfo");
            const btnLogin = document.getElementById("loginButton");

            if (namaSimpanan) {
                // Tampilkan nama dan sembunyikan tombol login
                textUserInfo.innerHTML = "Halo, " + namaSimpanan + "!";
                if(btnLogin) btnLogin.style.display = "none";

                // Tambahkan tombol logout kecil secara otomatis
                const logoutAction = document.createElement("a");
                logoutAction.innerHTML = " (Keluar)";
                logoutAction.href = "#";
                logoutAction.style.fontSize = "0.7rem";
                logoutAction.style.color = "white";
                logoutAction.onclick = function() {
                    localStorage.removeItem("namaPengguna");
                    location.reload();
                };
                textUserInfo.appendChild(logoutAction);
            } else {
                // Jika tidak ada data login
                textUserInfo.innerHTML = "Belum login";
            }
        };
    </script>
</body>
</html>
