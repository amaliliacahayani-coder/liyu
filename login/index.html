<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus • Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* CSS tetap sama seperti kodingan asli untuk mempertahankan tampilan */
    :root {
      --card-bg: rgba(255,255,255,0.72); --card-border: rgba(255,255,255,0.9);
      --input-bg: rgba(255,255,255,0.85); --input-border: rgba(200,180,220,0.4);
      --input-focus: #f97316; --text-primary: #1a1025; --text-muted: #a394b4;
      --accent: #f97316; --success: #10b981; --danger: #ef4444;
      --btn-grad: linear-gradient(135deg, #f97316, #ec4899);
      --shadow-card: 0 25px 60px rgba(120,60,180,0.12), 0 8px 20px rgba(0,0,0,0.06);
      --shadow-btn: 0 10px 30px rgba(249,115,22,0.45);
      --radius: 28px; --radius-sm: 16px; --radius-pill: 50px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'DM Sans',sans-serif; overflow-y:auto; padding:2rem 1rem; }
    .bg-canvas { position:fixed; inset:0; z-index:0; background:linear-gradient(135deg,#fff7ed 0%,#fce7f3 35%,#eff6ff 70%,#f0fdf4 100%); }
    .orb { position:absolute; border-radius:50%; filter:blur(80px); mix-blend-mode:multiply; animation:drift var(--dur,20s) ease-in-out infinite alternate; opacity:0.55; }
    .orb-1{width:480px;height:480px;background:#fbbf24;top:-10%;left:-10%;--dur:18s;}
    .orb-2{width:420px;height:420px;background:#f472b6;top:5%;right:-5%;--dur:22s;animation-direction:alternate-reverse;}
    .orb-3{width:360px;height:360px;background:#818cf8;bottom:-5%;left:20%;--dur:16s;}
    .orb-4{width:300px;height:300px;background:#34d399;bottom:10%;right:15%;--dur:25s;animation-direction:alternate-reverse;}
    @keyframes drift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.97)}100%{transform:translate(20px,-10px) scale(1.02)}}
    .card { position:relative; z-index:10; width:100%; max-width:440px; background:var(--card-bg); backdrop-filter:blur(24px) saturate(200%); -webkit-backdrop-filter:blur(24px) saturate(200%); border:1.5px solid var(--card-border); border-radius:var(--radius); padding:2.8rem 2.6rem 2.4rem; box-shadow:var(--shadow-card); margin:auto; animation:fadeUp .6s cubic-bezier(.34,1.2,.64,1) both; }
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:2.2rem;}
    .brand-icon{width:44px;height:44px;background:var(--btn-grad);border-radius:14px;display:flex;align-items:center;justify-content:center;}
    .brand-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:var(--btn-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .tab-bar{display:flex;background:rgba(0,0,0,.05);border-radius:var(--radius-pill);padding:5px;margin-bottom:2rem;gap:4px;}
    .tab-btn{flex:1;padding:.55rem;border:none;background:transparent;border-radius:var(--radius-pill);cursor:pointer;}
    .tab-btn.active{background:white;color:var(--text-primary);box-shadow:0 3px 12px rgba(0,0,0,.1);}
    .form-wrapper.hidden{display:none;}
    .form-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:700;margin-bottom:.4rem;}
    .form-subtitle{font-size:.92rem;color:var(--text-muted);margin-bottom:2rem;}
    .input-group{position:relative;margin-bottom:1.1rem;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
    .input-group input{width:100%;padding:.85rem 1rem .85rem 2.7rem;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--radius-sm);outline:none;}
    .btn-cta{width:100%;padding:1rem;background:var(--btn-grad);border:none;border-radius:var(--radius-sm);color:white;font-weight:700;cursor:pointer;margin-top:10px;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:white;padding:.75rem 1.5rem;border-radius:50px;box-shadow:0 10px 40px rgba(0,0,0,0.1);opacity:0;transition:all .4s;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="orb orb-3"></div><div class="orb orb-4"></div>
</div>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🚀</div>
    <span class="brand-name">NEXUS</span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Create account</button>
  </div>

  <div id="loginPanel" class="form-wrapper">
    <p class="form-title">Welcome back 👋</p>
    <p class="form-subtitle">Sign in to continue to Nexus.</p>
    <form id="loginFormEl">
      <div class="input-group">
        <input type="text" id="loginUsername" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      <button type="submit" class="btn-cta" id="loginBtn">Sign in</button>
    </form>
  </div>

  <div id="registerPanel" class="form-wrapper hidden">
    <p class="form-title">Join Nexus ✨</p>
    <p class="form-subtitle">Create your account in seconds.</p>
    <form id="registerFormEl">
      <div class="input-group"><input type="text" id="regUsername" placeholder="Username" required></div>
      <div class="input-group"><input type="email" id="regEmail" placeholder="Email address" required></div>
      <div class="input-group"><input type="password" id="regPassword" placeholder="Password" required></div>
      <button type="submit" class="btn-cta" id="registerBtn">Create account</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
  // 1. FUNGSI PINDAH TAB
  function switchTab(tab) {
    document.getElementById('loginPanel').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerPanel').classList.toggle('hidden', tab === 'login');
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab !== 'login');
  }

  // 2. FUNGSI TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 3. LOGIKA LOGIN (REVISI REDIRECT)
  document.getElementById('loginFormEl').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    
    // Animasi Loading
    btn.innerHTML = '<div class="spinner"></div>';
    btn.disabled = true;

    // Simulasi Proses Login (Bisa diganti dengan Fetch API jika sudah siap)
    setTimeout(() => {
      showToast('Login Berhasil! Mengalihkan...');
      
      // BARIS KRUSIAL: Pindah ke Landing Page setelah 1.5 detik
      setTimeout(() => {
        window.location.href = "../index.html"; 
      }, 1500);
      
    }, 1000);
  });
</script>

<script src="js/login.js"></script>

</body>
</html>
