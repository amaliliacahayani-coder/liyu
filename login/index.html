<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus • Auth</title>
  <style>
    :root { --btn-grad: linear-gradient(135deg, #f97316, #ec4899); --radius-sm: 16px; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; }
    .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .input-group input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .btn-cta { width: 100%; padding: 12px; background: var(--btn-grad); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <h2>Sign In</h2>
  <form id="loginFormEl">
    <div class="input-group">
      <input type="text" id="loginUsername" placeholder="Masukkan Nama/Username" required>
    </div>
    <div class="input-group">
      <input type="password" id="loginPassword" placeholder="Password" required>
    </div>
    <button type="submit" class="btn-cta" id="loginBtn">Sign in</button>
  </form>
</div>

<script>
  document.getElementById('loginFormEl').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // AMBIL NAMA dari input
    const namaUser = document.getElementById('loginUsername').value;
    
    // SIMPAN KE LOCALSTORAGE (Ini kuncinya)
    localStorage.setItem("namaPengguna", namaUser);

    const btn = document.getElementById('loginBtn');
    btn.innerHTML = 'Memproses...';
    
    setTimeout(() => {
      // PINDAH KE LANDING PAGE
      window.location.href = "../index.html"; 
    }, 1000);
  });
</script>
</body>
</html>
